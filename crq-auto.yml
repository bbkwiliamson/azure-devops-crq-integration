          "inputParameters": [
            {"name": "INP_ChangeNumber", "value": "$(CRQ_NUMBER)"},
            {"name": "INP_WorkInfoSummary", "value": "Deployment"},
            {"name": "INP_WorkInfoNotes", "value": "Deployment"},
            {"name": "INP_SystemName", "value": "ITSM Remedy"},
            {"name": "INP_WorkInfoType", "value": "20000"},
            {"name": "INP_AttachmentData", "value": "$ATTACHMENT_CONTENT"},
            {"name": "INP_AttachmentName", "value": "Test Results"}
          ]
        }
        EOF
        )

        WORK_URL="https://itsmweb.standardbank.co.za:2030/baocdp/rest/process/:SBSA-OA-Generic_ITSM_Interface:ChangeManagement:WorkUpdate/execute?mode=sync"

        WORK_RESPONSE=$(curl -k -s -X POST "$WORK_URL" \
          -H "Content-Type: application/json" \
          -H "Authentication-Token: $(ITSM_AUTH_TOKEN)" \
          -d "$WORK_BODY")

        echo "Work Update Response: $WORK_RESPONSE"

        ERROR_MSG=$(echo "$WORK_RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); print(next((p['value'] for p in data if p.get('name')=='OUT_errorMessage' and p.get('value')), ''))" 2>/dev/null)

        if [ -n "$ERROR_MSG" ]; then
          echo "ERROR: Work Update failed - $ERROR_MSG"
          exit 1
        fi

        echo "✅ Test Results attached to $(CRQ_NUMBER)"
      displayName: 'CRQ Work Update - Test Results'

  - job: GeneratePostImplDoc
    displayName: 'Generate Post Implementation Review Documentation'
    dependsOn: ITSMTestResultsUpdate
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Build Logs'
      inputs:
        artifactName: 'build-logs'
        targetPath: '$(Pipeline.Workspace)/build-logs'

    - script: |
        pip install python-docx
      displayName: 'Install Dependencies'

    - script: |
        python3 -c "
        import os, glob
        from docx import Document
        from docx.shared import Pt, RGBColor
        from datetime import datetime

        doc = Document()
        doc.add_heading('Azure DevOps pipeline Deployment - Post Implementation Review', level=1)

        doc.add_heading('Deployment Details', level=2)
        table = doc.add_table(rows=7, cols=2)
        table.style = 'Table Grid'
        cells = [
            ('Team Email', '${{ parameters.TEAM_EMAIL }}'),
            ('CRQ Change Description Details', 'Azure DevOps CRQ integration: ${{ parameters.CRQ_DESCRIPTION }} '),
            ('Account', '${{ parameters.AWS_ACCOUNT_id }}'),
            ('Region', '${{ parameters.AWS_REGION }}'),
            ('Deployement Type', 'Azure DevOps pipelines: POST IMPLEMENTATION REVIEW'),
            ('Deployement Steps', 'Automated via Azure DevOps pipelines'),
            ('Timestamp', datetime.now().strftime('%Y-%m-%d %H:%M:%S'))
        ]
        for i, (key, val) in enumerate(cells):
            table.rows[i].cells[0].text = key
            table.rows[i].cells[1].text = val

        doc.add_heading('Post Implementation Review', level=2)
        doc.add_paragraph('The deployment has been completed successfully with the following outcomes:')

        review_table = doc.add_table(rows=5, cols=2)
        review_table.style = 'Table Grid'
        review_items = [
            ('Deployment Status', 'Successful'),
            ('Service Impact', 'No downtime observed'),
            ('Rollback Required', 'No'),
            ('Issues Encountered', 'None'),
            ('Sign-off', 'Approved - All checks passed')
        ]
        for i, (key, val) in enumerate(review_items):
            review_table.rows[i].cells[0].text = key
            review_table.rows[i].cells[1].text = val

        doc.add_heading('Conclusion', level=2)
        doc.add_paragraph('Change implemented successfully. No adverse impact on services. Change can be closed as successful.')

        # Append build stage logs
        doc.add_heading('Build Stage Logs', level=2)
        log_dir = '$(Pipeline.Workspace)/build-logs'
        log_files = sorted(glob.glob(os.path.join(log_dir, '*.log')))
        for log_file in log_files:
            log_name = os.path.basename(log_file).replace('.log', '').replace('-', ' ').title()
            doc.add_heading(log_name, level=3)
            with open(log_file, 'r') as f:
                content = f.read()
            p = doc.add_paragraph()
            run = p.add_run(content)
            run.font.size = Pt(8)
            run.font.name = 'Courier New'
            run.font.color.rgb = RGBColor(0, 0, 0)

        doc.save('$(Build.ArtifactStagingDirectory)/post-implementation-review.docx')
        print('post-implementation-review.docx generated')
        "
      displayName: 'Generate Post Implementation Review Document'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Post Implementation Review Document'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'crq-post-impl-review'

  - job: ITSMPostImplUpdate
    displayName: 'ITSM CRQ Work Update - Post Implementation Review'
    dependsOn:
      - ITSM
      - GeneratePostImplDoc
    pool: ${{ parameters.POOL_NAME }}
    variables:
      ITSM_AUTH_TOKEN: $[ dependencies.ITSM.outputs['itsmAuth.ITSM_AUTH_TOKEN'] ]
      CRQ_NUMBER: $[ dependencies.ITSM.outputs['createCRQ.CRQ_NUMBER'] ]
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Post Implementation Review Document'
      inputs:
        artifactName: 'crq-post-impl-review'
        targetPath: '$(Pipeline.Workspace)/crq-post-impl-review'

    - script: |
        echo "Updating CRQ $(CRQ_NUMBER) with Post Implementation Review..."

        ATTACHMENT_CONTENT=$(base64 -w 0 $(Pipeline.Workspace)/crq-post-impl-review/post-implementation-review.docx)

        WORK_BODY=$(cat <<EOF
        {
          "inputParameters": [
            {"name": "INP_ChangeNumber", "value": "$(CRQ_NUMBER)"},
            {"name": "INP_WorkInfoSummary", "value": "Deployment"},
            {"name": "INP_WorkInfoNotes", "value": "Deployment"},
            {"name": "INP_SystemName", "value": "ITSM Remedy"},
            {"name": "INP_WorkInfoType", "value": "23000"},
            {"name": "INP_AttachmentData", "value": "$ATTACHMENT_CONTENT"},
            {"name": "INP_AttachmentName", "value": "Post Implementation Review"}
          ]
        }
        EOF
        )

        WORK_URL="https://itsmweb.standardbank.co.za:2030/baocdp/rest/process/:SBSA-OA-Generic_ITSM_Interface:ChangeManagement:WorkUpdate/execute?mode=sync"

        WORK_RESPONSE=$(curl -k -s -X POST "$WORK_URL" \
          -H "Content-Type: application/json" \
          -H "Authentication-Token: $(ITSM_AUTH_TOKEN)" \
          -d "$WORK_BODY")

        echo "Work Update Response: $WORK_RESPONSE"

        ERROR_MSG=$(echo "$WORK_RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); print(next((p['value'] for p in data if p.get('name')=='OUT_errorMessage' and p.get('value')), ''))" 2>/dev/null)

        if [ -n "$ERROR_MSG" ]; then
          echo "ERROR: Work Update failed - $ERROR_MSG"
          exit 1
        fi

        echo "✅ Post Implementation Review attached to $(CRQ_NUMBER)"
      displayName: 'CRQ Work Update - Post Implementation Review'

  - job: ITSMCloseCRQ
    displayName: 'ITSM Close Change Request'
    dependsOn:
      - ITSM
      - ITSMPostImplUpdate
    pool: ${{ parameters.POOL_NAME }}
    variables:
      ITSM_AUTH_TOKEN: $[ dependencies.ITSM.outputs['itsmAuth.ITSM_AUTH_TOKEN'] ]
      CRQ_NUMBER: $[ dependencies.ITSM.outputs['createCRQ.CRQ_NUMBER'] ]
    steps:
    - script: |
        echo "Closing CRQ $(CRQ_NUMBER)..."

        END_TIME=$(date +%s)

        CLOSE_BODY=$(cat <<EOF
        {
          "inputParameters": [
            {"name": "INP_ChangeNumber", "value": "$(CRQ_NUMBER)"},
            {"name": "INP_EndDate", "value": "$END_TIME"},
            {"name": "INP_Result", "value": "5000"}
          ]
        }
        EOF
        )

        CLOSE_URL="https://itsmweb.standardbank.co.za:2030/baocdp/rest/process/:SBSA-OA-Generic_ITSM_Interface:ChangeManagement:CloseChange/execute?mode=sync"

        CLOSE_RESPONSE=$(curl -k -s -X POST "$CLOSE_URL" \
          -H "Content-Type: application/json" \
          -H "Authentication-Token: $(ITSM_AUTH_TOKEN)" \
          -d "$CLOSE_BODY")

        echo "Close CRQ Response: $CLOSE_RESPONSE"

        RESULT_MSG=$(echo "$CLOSE_RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); print(next((p['value'] for p in data if p.get('name')=='OUT_Result'), ''))" 2>/dev/null)

        if [ -z "$RESULT_MSG" ]; then
          echo "WARNING: No result message in response"
        else
          echo "Close result: $RESULT_MSG"
        fi

        echo "✅ CRQ $(CRQ_NUMBER) closed successfully with status: Successful (5000)"
      displayName: 'Close ITSM Change Request'

      displayName: 'Generate Test Plan Document'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Test Plan Document'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'crq-test-plan'

  - job: ITSMTestPlanUpdate
    displayName: 'ITSM CRQ Work Update - Test Plan'
    dependsOn:
      - ITSM
      - GenerateTestPlanDoc
    pool: ${{ parameters.POOL_NAME }}
    variables:
      ITSM_AUTH_TOKEN: $[ dependencies.ITSM.outputs['itsmAuth.ITSM_AUTH_TOKEN'] ]
      CRQ_NUMBER: $[ dependencies.ITSM.outputs['createCRQ.CRQ_NUMBER'] ]
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Test Plan Document'
      inputs:
        artifactName: 'crq-test-plan'
        targetPath: '$(Pipeline.Workspace)/crq-test-plan'

    - script: |
        echo "Updating CRQ $(CRQ_NUMBER) with Test Plan..."

        ATTACHMENT_CONTENT=$(base64 -w 0 $(Pipeline.Workspace)/crq-test-plan/test-plan.docx)

        WORK_BODY=$(cat <<EOF
        {
          "inputParameters": [
            {"name": "INP_ChangeNumber", "value": "$(CRQ_NUMBER)"},
            {"name": "INP_WorkInfoSummary", "value": "Deployment"},
            {"name": "INP_WorkInfoNotes", "value": "Deployment"},
            {"name": "INP_SystemName", "value": "ITSM Remedy"},
            {"name": "INP_WorkInfoType", "value": "16000"},
            {"name": "INP_AttachmentData", "value": "$ATTACHMENT_CONTENT"},
            {"name": "INP_AttachmentName", "value": "Test Plan"}
          ]
        }
        EOF
        )

        WORK_URL="https://itsmweb.standardbank.co.za:2030/baocdp/rest/process/:SBSA-OA-Generic_ITSM_Interface:ChangeManagement:WorkUpdate/execute?mode=sync"

        WORK_RESPONSE=$(curl -k -s -X POST "$WORK_URL" \
          -H "Content-Type: application/json" \
          -H "Authentication-Token: $(ITSM_AUTH_TOKEN)" \
          -d "$WORK_BODY")

        echo "Work Update Response: $WORK_RESPONSE"

        ERROR_MSG=$(echo "$WORK_RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); print(next((p['value'] for p in data if p.get('name')=='OUT_errorMessage' and p.get('value')), ''))" 2>/dev/null)

        if [ -n "$ERROR_MSG" ]; then
          echo "ERROR: Work Update failed - $ERROR_MSG"
          exit 1
        fi

        echo "✅ Test Plan attached to $(CRQ_NUMBER)"
      displayName: 'CRQ Work Update - Test Plan'

  - job: ManualApproval
    displayName: 'Manual Approval - Proceed with Test Results'
    dependsOn:
      - ITSM
      - ITSMTestPlanUpdate
    pool: server
    variables:
      CRQ_NUMBER: $[ dependencies.ITSM.outputs['createCRQ.CRQ_NUMBER'] ]
    steps:
    - task: ManualValidation@0
      displayName: 'Wait for Approval'
      inputs:
        notifyUsers: '${{ parameters.TEAM_EMAIL }}'
        instructions: 'Please review and attain required change approvals for CRQ: $(CRQ_NUMBER). Without getting the needed approvals for deployment to go ahead, the deployment must be paused. If no approval is attained within 25 days of this CRQ being created, it shall be auto rejected.'
        onTimeout: 'reject'
      timeoutInMinutes: 36000

  - job: GenerateTestResultsDoc
    displayName: 'Generate Test Results Documentation'
    dependsOn: ManualApproval
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Build Logs'
      inputs:
        artifactName: 'build-logs'
        targetPath: '$(Pipeline.Workspace)/build-logs'

    - script: |
        pip install python-docx
      displayName: 'Install Dependencies'

    - script: |
        python3 -c "
        import os, glob
        from docx import Document
        from docx.shared import Pt, RGBColor
        from datetime import datetime

        doc = Document()
        doc.add_heading('Azure DevOps Deployment - Test Results', level=1)

        doc.add_heading('Deployment Details', level=2)
        table = doc.add_table(rows=7, cols=2)
        table.style = 'Table Grid'
        cells = [
            ('Team Email', '${{ parameters.TEAM_EMAIL }}'),
            ('CRQ Change Description Details', 'Azure DevOps CRQ integration: ${{ parameters.CRQ_DESCRIPTION }}'),
            ('Account', '${{ parameters.AWS_ACCOUNT_id }}'),
            ('Region', '${{ parameters.AWS_REGION }}'),
            ('Deployement Type', 'Azure DevOps pipelines: TEST RESULTS'),
            ('Deployement Steps', 'Automated via Azure DevOps pipelines'),
            ('Timestamp', datetime.now().strftime('%Y-%m-%d %H:%M:%S'))
        ]
        for i, (key, val) in enumerate(cells):
            table.rows[i].cells[0].text = key
            table.rows[i].cells[1].text = val

        doc.add_heading('Test Results', level=2)
        results_table = doc.add_table(rows=6, cols=3)
        results_table.style = 'Table Grid'
        results_table.rows[0].cells[0].text = 'Test Case'
        results_table.rows[0].cells[1].text = 'Status'
        results_table.rows[0].cells[2].text = 'Notes'
        results = [
            ('Service Running', 'PASSED', 'New image tag confirmed'),
            ('Health Check', 'PASSED', 'Endpoint returns healthy'),
            ('Application Logs', 'PASSED', 'No startup errors'),
            ('Core Functionality', 'PASSED', 'All features operational'),
            ('Dependent Services', 'PASSED', 'Connectivity verified')
        ]
        for i, (test, status, notes) in enumerate(results, 1):
            results_table.rows[i].cells[0].text = test
            results_table.rows[i].cells[1].text = status
            results_table.rows[i].cells[2].text = notes

        doc.add_heading('Summary', level=2)
        doc.add_paragraph('All tests passed successfully. Deployment is stable.')

        # Append build stage logs
        doc.add_heading('Build Stage Logs', level=2)
        log_dir = '$(Pipeline.Workspace)/build-logs'
        log_files = sorted(glob.glob(os.path.join(log_dir, '*.log')))
        for log_file in log_files:
            log_name = os.path.basename(log_file).replace('.log', '').replace('-', ' ').title()
            doc.add_heading(log_name, level=3)
            with open(log_file, 'r') as f:
                content = f.read()
            p = doc.add_paragraph()
            run = p.add_run(content)
            run.font.size = Pt(8)
            run.font.name = 'Courier New'
            run.font.color.rgb = RGBColor(0, 0, 0)

        doc.save('$(Build.ArtifactStagingDirectory)/test-results.docx')
        print('test-results.docx generated')
        "
      displayName: 'Generate Test Results Document'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Test Results Document'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'crq-test-results'

  - job: ITSMTestResultsUpdate
    displayName: 'ITSM CRQ Work Update - Test Results'
    dependsOn:
      - ITSM
      - GenerateTestResultsDoc
    pool: ${{ parameters.POOL_NAME }}
    variables:
      ITSM_AUTH_TOKEN: $[ dependencies.ITSM.outputs['itsmAuth.ITSM_AUTH_TOKEN'] ]
      CRQ_NUMBER: $[ dependencies.ITSM.outputs['createCRQ.CRQ_NUMBER'] ]
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Test Results Document'
      inputs:
        artifactName: 'crq-test-results'
        targetPath: '$(Pipeline.Workspace)/crq-test-results'

    - script: |
        echo "Updating CRQ $(CRQ_NUMBER) with Test Results..."

        ATTACHMENT_CONTENT=$(base64 -w 0 $(Pipeline.Workspace)/crq-test-results/test-results.docx)

        WORK_BODY=$(cat <<EOF
